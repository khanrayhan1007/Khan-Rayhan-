<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  

  <title>HTML</title>
  
  <!-- HTML -->

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <!-- Display Secction  Starts-->
  <section class="section">
  <div class="section-header">
   
   <h3 class="section-title">Display Color</h3>
  <div id="clock" class="clock">
  <span id="hour"></span> :
  <span id="minute"></span> :
  <span id="second"></span>
  <span id="ampm"></span> | 
  <span id="date"></span>
 
  
</div>
    <button type="submit" class="section-header-action" id="generate-random-color">Random Color</button>
    </div> 
     <div class="divider"></div>
      <div class="color-display" id="color-display" ></div>
     </section>
     
     <!-- Display Section ends -->
    
    <section class="section">
      <section class="section-header">
        <h3 class="section-title">Change & Copy Color</h3>
        <button class="section-header-action" id="save-to-custom">Save</button>
    <button type="submit" class="section-header-action" id="copy-to-clipboard">Copy</button>
      </section>
      <div class="divider"></div>
            <!-- select copy mode section starts-->
      <div class="select-copy-mode"> <p class="lead">Select Copy Mode</p> 
       <div class="mode-radio-group">
        <div class="mode-input-group">
          <input 
          type="radio"
          name="color-mode"
          id="color-mode-hex"
          value="hex"
          checked
          >
          <label for="color-mode-hex">Hex</label>
        </div>
         <div class="mode-input-group">
          <input 
          type="radio"
          name="color-mode"
          id="color-mode-rgb"
          value="rgb"
          
          >
          <label for="color-mode-rgb">RGB</label>
        </div>
        
       </div>
      </div>
      <!-- select copy mode section ends-->
      
      <!-- select color mode section starts-->
      <div class="selected-color-code">
        <div class="hex-input-group">
          <label for="input-hex" class="lead">Hex</label>
            <div class="hex-icon">#</div>
          <input type="text"
          id="input-hex"
          class="hex-input text-input"
          />
        
        </div>
        
        <div class="RGB-input-group">
          <label for="input-rgb" class="lead">RGB</label>
          <input type="text"
          id="input-rgb"
          class="text-input"
          disabled
          />
        </div>
      </div>
      <!-- select color mode section ends-->
      
      
      <!--  color slider group section start-->
      <div class="color-sliders">
        <p>Adjust RGB Color</p>
        <div class="color-sliders-group">
          
          <div>
            <div class="slider-lebel-group">
              <p>Red</p>
              <p id="color-slider-red-lebel"></p>
            </div>
            <input type="range"
            min"0"
            max="255"
            class="color-slider"
            id="color-slider-red" />
          </div>
          
           <div>
            <div class="slider-lebel-group">
              <p>green</p>
              <p id="color-slider-green-lebel"></p>
            </div>
            <input type="range"
            min"0"
            max="255"
            class="color-slider "
            id="color-slider-green" />
          </div>
          
          
           <div>
            <div class="slider-lebel-group">
              <p>blue</p>
              <p id="color-slider-blue-lebel"></p>
            </div>
            <input type="range"
            min"0"
            max="255"
            class="color-slider"
            id="color-slider-blue" />
          </div>
   
        </div>
        
      </div>
      
    </section>
      <section class="section">
  <div class="section-header">
   
   <h3 class="section-title">Preset Colors</h3>

    </div> 
     <div class="divider"></div>
   
     <div class="preset-colors" id="preset-colors">
       
     </div>
     </section>
     <section class="section">
  <div class="section-header">
   
   <h3 class="section-title">Favorite Colors</h3>

    </div> 
     <div class="divider"></div>
     <div class="preset-colors" id="custom-colors">
     </div>
     </section>
     
     <section class="section">
  <div class="section-header">
   
   <h3 class="section-title">Background Preferences</h3>

    </div> 
     <div class="divider"></div>
     <div class="background-preferences">
       <div class="background-left-panel">
         <p class="lead"> Background Preview</p>
         <div class="background-image" id="bg-preview"></div>
         <div class="background-control">
           <input type="file" class="file-input" id="bg-file-input"/>
            <button class="background-delete-btn" id="bg-file-delete-btn">Remove</button>
           <button class="background-control-btn" id="bg-file-input-btn">Upload</button>
         </div>
         
         
       </div>
       
       <div class="background-right-panel"></div>
     </div>
     </section>
     
     
     
   </div>
  
    <script src="script.js"></script>
</body>
</html>
